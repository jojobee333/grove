<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove</title>
<!-- Pyodide: Python in the browser via WebAssembly (lazy-loaded on first Python challenge) -->
<script>
  window._pyodidePromise = null;
  function loadPyodide() {
    if (window._pyodidePromise) return window._pyodidePromise;
    window._pyodidePromise = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js';
      s.onload = () => window.loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/' }).then(resolve).catch(reject);
      s.onerror = () => reject(new Error('Failed to load Pyodide'));
      document.head.appendChild(s);
    });
    return window._pyodidePromise;
  }
</script>
<!-- CodeMirror: syntax-highlighted code editor (lazy-loaded on first code challenge) -->
<script>
  window._cmEditors = {};
  window._cmPromise = null;
  function loadCodeMirror() {
    if (window._cmPromise) return window._cmPromise;
    window._cmPromise = new Promise((resolve, reject) => {
      const base = 'https://cdn.jsdelivr.net/npm/codemirror@5.65.19';
      const link = document.createElement('link');
      link.rel = 'stylesheet'; link.href = `${base}/lib/codemirror.min.css`;
      document.head.appendChild(link);
      const s = document.createElement('script');
      s.src = `${base}/lib/codemirror.min.js`;
      s.onload = () => {
        let loaded = 0;
        const done = () => { if (++loaded === 2) resolve(window.CodeMirror); };
        const fail = () => reject(new Error('CodeMirror mode load failed'));
        ['mode/python/python.min.js', 'mode/javascript/javascript.min.js'].forEach(path => {
          const m = document.createElement('script');
          m.src = `${base}/${path}`; m.onload = done; m.onerror = fail;
          document.head.appendChild(m);
        });
      };
      s.onerror = () => reject(new Error('CodeMirror failed to load'));
      document.head.appendChild(s);
    });
    return window._cmPromise;
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --muted: #6b6b65;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --accent-text: #1a4032;
    --warn: #b45309;
    --warn-light: #fef3c7;
    --danger: #991b1b;
    --danger-light: #fee2e2;
    --surface-raised: #efefeb;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --surface-raised: #2a2a28;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #e8e8e2;
      --muted: #888880;
      --accent: #52b788;
      --accent-light: #1a3028;
      --accent-text: #a7d9bb;
      --warn: #f59e0b;
      --warn-light: #2a2010;
      --danger: #f87171;
      --danger-light: #2a1010;
    }
  }

  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar { border-right: 1px solid var(--border); padding: 1.5rem 1rem; background: var(--surface); position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 2rem; max-width: 760px; }

  /* Sidebar */
  .brand { font-size: 20px; font-weight: 600; color: var(--accent); margin-bottom: 1.5rem; letter-spacing: -0.5px; }
  .nav-section { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin: 1.2rem 0 0.4rem; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text); border: none; background: none; width: 100%; text-align: left; transition: background 0.1s; }
  .nav-item:hover { background: var(--accent-light); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-text); font-weight: 500; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); flex-shrink: 0; }
  .nav-dot.done { background: var(--accent); }
  .nav-dot.current { background: var(--warn); }

  /* Progress bar */
  .progress-wrap { margin: 1rem 0; }
  .progress-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; }

  /* Cards (panels) */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .card-sm { padding: 1rem; }

  /* Headings */
  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.75rem; }
  h3 { font-size: 15px; font-weight: 600; margin-bottom: 0.5rem; }
  p { font-size: 14px; line-height: 1.7; color: var(--muted); margin-bottom: 0.75rem; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--accent-light); color: var(--accent-text); }
  .badge-amber { background: var(--warn-light); color: var(--warn); }
  .badge-gray { background: var(--border); color: var(--muted); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); transition: all 0.1s; }
  .btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; color: white; }
  .btn-row { display: flex; gap: 8px; margin-top: 1rem; }

  /* Module map */
  .module-grid { display: grid; gap: 12px; }
  .module-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .module-card:hover { border-color: var(--accent); }
  .module-card.locked { opacity: 0.5; cursor: default; }
  .module-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .module-title { font-size: 15px; font-weight: 600; }
  .module-meta { font-size: 12px; color: var(--muted); }
  .lesson-list { list-style: none; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; display: none; }
  .lesson-list.open { display: block; }
  .lesson-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; cursor: pointer; }
  .lesson-item:hover { color: var(--accent); }
  .lesson-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .lesson-check.done { background: var(--accent); border-color: var(--accent); color: white; font-size: 10px; }

  /* Lesson reader */
  .lesson-content { font-size: 15px; line-height: 1.8; }
  .lesson-content h2 { font-size: 17px; margin: 1.5rem 0 0.5rem; }
  .lesson-content h3 { font-size: 15px; margin: 1.2rem 0 0.4rem; }
  .lesson-content p { color: var(--text); margin-bottom: 0.9rem; }
  .lesson-content ul, .lesson-content ol { padding-left: 1.4rem; margin-bottom: 0.9rem; }
  .lesson-content li { margin-bottom: 0.3rem; font-size: 14px; }
  .lesson-content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--muted); font-style: italic; margin: 1rem 0; }
  .lesson-content code { font-family: monospace; font-size: 13px; background: var(--border); padding: 1px 5px; border-radius: 4px; }
  .lesson-content pre { background: var(--surface-raised); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.2rem; overflow-x: auto; margin: 1rem 0; }
  .lesson-content pre code { background: none; padding: 0; font-size: 13px; line-height: 1.6; }
  .lesson-content .md-table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 14px; }
  .lesson-content .md-table th, .lesson-content .md-table td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .lesson-content .md-table thead { background: var(--accent-light); font-weight: 600; }
  .lesson-content .md-table tbody tr:nth-child(even) { background: rgba(0,0,0,0.02); }
  .lesson-content a { color: var(--accent); text-decoration: underline; }
  .lesson-nav { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  /* Flashcard */
  .flashcard-wrap { perspective: 1000px; }
  .flashcard { width: 100%; min-height: 220px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.4s; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-face { position: absolute; width: 100%; min-height: 220px; backface-visibility: hidden; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; display: flex; flex-direction: column; justify-content: center; background: var(--surface); }
  .fc-back { transform: rotateY(180deg); background: var(--accent-light); border-color: var(--accent); }
  .fc-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 0.75rem; }
  .fc-text { font-size: 17px; font-weight: 500; text-align: center; line-height: 1.5; }
  .fc-source { font-size: 11px; color: var(--muted); margin-top: 1rem; text-align: center; }
  .rating-row { display: flex; gap: 8px; justify-content: center; margin-top: 1rem; }
  .rating-btn { padding: 8px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid; }
  .rating-btn.hard { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .rating-btn.okay { border-color: var(--warn); color: var(--warn); background: var(--warn-light); }
  .rating-btn.easy { border-color: var(--accent); color: var(--accent-text); background: var(--accent-light); }
  .fc-progress { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 1rem; }

  /* Quiz */
  .question-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 12px; }
  .question-text { font-size: 15px; font-weight: 500; margin-bottom: 1rem; line-height: 1.5; }
  .option-list { display: flex; flex-direction: column; gap: 8px; }
  .option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; font-size: 14px; transition: border-color 0.1s; }
  .option:hover { border-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: var(--accent-light); }
  .option.correct { border-color: var(--accent); background: var(--accent-light); }
  .option.wrong { border-color: var(--danger); background: var(--danger-light); }
  .option-key { font-weight: 600; color: var(--muted); flex-shrink: 0; }
  .explanation { font-size: 13px; color: var(--muted); padding: 10px 12px; background: var(--bg); border-radius: var(--radius); margin-top: 8px; line-height: 1.6; display: none; }
  .explanation.show { display: block; }
  .short-answer textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; resize: vertical; min-height: 80px; background: var(--surface); color: var(--text); font-family: inherit; }
  .answer-key { font-size: 13px; padding: 10px 12px; background: var(--accent-light); border-radius: var(--radius); margin-top: 8px; display: none; line-height: 1.6; }
  .answer-key.show { display: block; }
  .quiz-score { font-size: 28px; font-weight: 700; color: var(--accent); text-align: center; margin: 1rem 0 0.25rem; }
  .quiz-score-label { font-size: 14px; color: var(--muted); text-align: center; }

  /* File loader */
  .drop-zone { border: 2px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 3rem 2rem; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .drop-zone:hover { border-color: var(--accent); }
  .drop-zone input { display: none; }

  /* Utilities */
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .mb-4 { margin-bottom: 1rem; }
  .mt-4 { margin-top: 1rem; }
  .text-muted { color: var(--muted); font-size: 13px; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  /* Mastery heatmap (Phase C) */
  .mastery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .mastery-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .mastery-card.locked { opacity: 0.4; }
  .mastery-bar-wrap { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 4px; }
  .mastery-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
  .badge-red { background: var(--danger-light); color: var(--danger); }

  /* Learning paths (Phase C) */
  .path-active { border-color: var(--accent) !important; background: var(--accent-light); }

  /* Code challenges */
  .code-challenge-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 12px; }
  .code-editor { margin: 1rem 0; }
  .code-editor textarea { display: none; } /* hidden once CM upgrades it; visible as fallback */

  /* CodeMirror — always dark */
  .CodeMirror {
    height: auto; min-height: 200px;
    font-family: 'Courier New', Consolas, monospace; font-size: 13px; line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius);
    background: #1e1e1e !important; color: #d4d4d4 !important;
  }
  .CodeMirror-scroll { min-height: 200px; }
  .CodeMirror-gutters { background: #1e1e1e !important; border-right: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius) 0 0 var(--radius); }
  .CodeMirror-linenumber { color: #5a5a5a !important; padding: 0 10px; }
  .CodeMirror-cursor { border-left: 2px solid #d4d4d4 !important; }
  .CodeMirror-selected { background: #264f78 !important; }
  .CodeMirror-focused .CodeMirror-selected { background: #264f78 !important; }
  .CodeMirror-focused { border-color: var(--accent); }
  /* Syntax tokens */
  .cm-keyword  { color: #569cd6 !important; font-weight: bold; }
  .cm-def      { color: #dcdcaa !important; }
  .cm-variable, .cm-variable-2 { color: #9cdcfe !important; }
  .cm-property { color: #9cdcfe !important; }
  .cm-operator { color: #d4d4d4; }
  .cm-string, .cm-string-2 { color: #ce9178 !important; }
  .cm-comment  { color: #6a9955 !important; font-style: italic; }
  .cm-number   { color: #b5cea8 !important; }
  .cm-atom     { color: #569cd6 !important; }
  .cm-builtin  { color: #4ec9b0 !important; }
  .test-cases-visible { font-size: 13px; margin: 1rem 0; padding: 12px; background: var(--bg); border-radius: var(--radius); border-left: 3px solid var(--accent); }
  .test-case { margin-bottom: 8px; padding: 8px 0; }
  .test-case-name { font-weight: 500; color: var(--text); }
  .test-case-info { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .run-tests-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: var(--radius); cursor: pointer; font-weight: 500; font-size: 14px; margin-top: 8px; }
  .run-tests-btn:hover { opacity: 0.9; }
  .test-results { margin-top: 1rem; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); max-height: 300px; overflow-y: auto; }
  .test-result { padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .test-result:last-child { border-bottom: none; }
  .test-result.passed { color: var(--accent); font-weight: 500; }
  .test-result.failed { color: var(--danger); font-weight: 500; }
  .test-result-summary { font-weight: 500; padding: 12px 0; }
  .test-result-summary.all-passed { color: var(--accent); }
  .test-result-summary.some-failed { color: var(--warn); }

</style>
</head>
<body>
<h2 class="sr-only">Grove — structured learning from research</h2>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <a href="/" style="text-decoration:none"><div class="brand">Grove</div></a>
      <span id="bundle-badge" style="display:none;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--accent);color:white;letter-spacing:0.5px">v3</span>
    </div>

    <div id="course-meta" style="display:none">
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Overall progress</span>
          <span id="pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>

      <div class="nav-section">Navigate</div>
      <button class="nav-item active" onclick="showView('plan')" id="nav-plan">
        <span class="nav-dot done"></span> Learning plan
      </button>
      <button class="nav-item" onclick="showView('cards')" id="nav-cards">
        <span class="nav-dot" id="dot-cards"></span> Flashcards
      </button>
      <button class="nav-item" onclick="showView('code')" id="nav-code" style="display:none">
        <span class="nav-dot" id="dot-code"></span> Code challenges
      </button>
      <button class="nav-item" onclick="showView('progress')" id="nav-progress" style="display:none">
        <span class="nav-dot" id="dot-progress"></span> My progress
      </button>
      <button class="nav-item" onclick="showView('paths')" id="nav-paths" style="display:none">
        <span class="nav-dot" id="dot-paths"></span> Learning paths
      </button>

      <div class="nav-section">Modules</div>
      <div id="module-nav"></div>
    </div>

    <div id="load-prompt" style="margin-top:1rem">
      <p style="font-size:13px;margin-bottom:0.75rem">Load a course bundle to begin.</p>
      <button class="btn" onclick="document.getElementById('file-input').click()">Load bundle.json</button>
      <input type="file" id="file-input" accept=".json" onchange="loadCourse(event)" style="display:none">
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="card" style="text-align:center;padding:3rem">
      <h1 style="margin-bottom:0.5rem">Grove</h1>
      <p>Load a curriculum generated by the <strong>/grove</strong> skill to start learning.</p>
      <div style="margin-top:1.5rem">
        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
          Load bundle.json
        </button>
      </div>
    </div>
  </main>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let course = null;
let cards = null;
let assessments = {};
let progress = {};
let cardSession = { queue: [], current: 0, flipped: false };
let quizState = { answers: {}, submitted: false };
let bundle = null;        // v3 bundle (loaded from bundle.json)
let concepts = { concepts: [] };
let adaptiveRules = {};
let learningPaths = { paths: [] };

function saveProgress() {
  if (!course) return;
  localStorage.setItem('grove_progress_' + course.slug, JSON.stringify(progress));
}

function loadProgress() {
  if (!course) return;
  const saved = localStorage.getItem('grove_progress_' + course.slug);
  progress = saved ? JSON.parse(saved) : { lessons: {}, cards: {}, quizzes: {}, codeChallenges: {} };
  if (!progress.lessons)         progress.lessons         = {};
  if (!progress.cards)           progress.cards           = {};
  if (!progress.quizzes)         progress.quizzes         = {};
  if (!progress.codeChallenges)  progress.codeChallenges  = {};
  if (!progress.conceptMastery)  progress.conceptMastery  = {};
}

// ── FILE LOADING ───────────────────────────────────────────
function loadCourse(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // Require v3 bundle (has version + course keys)
      if (data.version && data.course) {
        initFromBundle(data);
      } else {
        alert('⚠️ Plain course.json is not supported.\n\nBuild a bundle first:\n  node build-bundle.mjs <slug>\n\nThen load curriculum/<slug>/bundle.json');
        event.target.value = '';
      }
    } catch(err) {
      alert('Could not parse file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function initFromBundle(data) {
  bundle = data;
  course = data.course;
  concepts = data.concepts || { concepts: [] };
  adaptiveRules = data.adaptiveRules || {};
  learningPaths = data.learningPaths || { paths: [] };
  // Pre-populate assessments so no per-module file loading is needed
  Object.assign(assessments, data.quizzes || {});
  loadProgress();
  // Initialize SR on all cards and merge saved state
  cards = (data.cards || []).map(c => {
    const sr = { ease: 2.5, interval: 0, reviews: 0, lapses: 0, next_review: null };
    const saved = progress.cards[c.id];
    if (saved) Object.assign(sr, saved);
    return { ...c, sr };
  });
  buildSidebar();
  showView('plan');
  document.getElementById('course-meta').style.display = 'block';
  document.getElementById('load-prompt').style.display = 'none';
  const bundleBadge = document.getElementById('bundle-badge');
  if (bundleBadge) bundleBadge.style.display = '';
  const nprog = document.getElementById('nav-progress');
  const npath = document.getElementById('nav-paths');
  const ncode = document.getElementById('nav-code');
  if (nprog) nprog.style.display = '';
  if (npath) npath.style.display = '';
  const hasChallenges = Object.values(data.codeChallenges || {}).some(m => m.challenges?.length > 0);
  if (ncode) ncode.style.display = hasChallenges ? '' : 'none';
}

function loadCards(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      cards = data.cards || [];
      // Merge saved SR state (initialize SR if not present in source file)
      cards.forEach(c => {
        if (!c.sr) c.sr = { ease: 2.5, interval: 0, reviews: 0, lapses: 0, next_review: null };
        if (progress.cards[c.id]) Object.assign(c.sr, progress.cards[c.id]);
      });
      showView('cards');
    } catch(err) { alert('Could not parse cards.json'); }
  };
  reader.readAsText(file);
}

function loadQuiz(file, moduleId) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      assessments[moduleId] = JSON.parse(e.target.result);
      showQuiz(moduleId);
    } catch(err) { alert('Could not parse quiz file'); }
  };
  reader.readAsText(file);
}

// ── PLANNER (Phase B) ──────────────────────────────────────
function computeNextSteps() {
  if (!bundle) return { nextLessons: [], weakConcepts: [], reviewQueue: [] };
  const completedLessons = new Set(Object.keys(progress.lessons || {}));
  const conceptMastery   = progress.conceptMastery || {};
  const rules = adaptiveRules.progression_rules || {};

  // Respect selected learning path: restrict candidates to path lesson IDs
  const selectedPath = progress.selectedPath || null;
  let pathLessonIds = null;
  if (selectedPath) {
    const p = (learningPaths.paths || []).find(p => p.id === selectedPath);
    if (p?.lessons) pathLessonIds = new Set(p.lessons);
  }

  // Milestone mastery gate — concepts taught by completed lessons
  const milestoneLessonIds = new Set(course.learning_plan?.milestone_lessons || []);
  const introducedConcepts = new Set();
  for (const m of course.modules || []) {
    for (const l of m.lessons || []) {
      if (completedLessons.has(l.id))
        (l.teaches_concepts || []).forEach(cid => introducedConcepts.add(cid));
    }
  }

  // Unlockable lessons: prerequisites met, not yet completed
  const nextLessons = [];
  const blockedByMastery = [];
  for (const m of course.modules || []) {
    for (const l of m.lessons || []) {
      if (completedLessons.has(l.id)) continue;
      if (pathLessonIds && !pathLessonIds.has(l.id)) continue;
      const prereqs    = l.prerequisites    || [];
      const unlockRule = l.unlock_rule ?? 'all_prerequisites_mastered';
      let unlocked = prereqs.length === 0;
      if (!unlocked && unlockRule === 'all_prerequisites_mastered')
        unlocked = prereqs.every(pid => completedLessons.has(pid));
      else if (!unlocked && unlockRule === 'any_prerequisite_mastered')
        unlocked = prereqs.some(pid => completedLessons.has(pid));
      if (!unlocked) continue;
      // Milestone mastery gate: requires avg concept mastery >= threshold
      if (milestoneLessonIds.has(l.id) && introducedConcepts.size > 0) {
        const threshold = l.mastery_threshold ?? 0.75;
        const scores    = [...introducedConcepts].map(cid => conceptMastery[cid] ?? 0);
        const avg       = scores.reduce((s, v) => s + v, 0) / scores.length;
        if (avg < threshold) {
          const mod = course.modules.find(mod => mod.lessons?.some(x => x.id === l.id));
          blockedByMastery.push({ ...l, avgMastery: avg, threshold, moduleName: mod?.title || '' });
          continue;
        }
      }
      nextLessons.push(l);
    }
  }

  // Weak concepts: introduced (lesson completed) but mastery below 0.6
  const weakConcepts = [];
  for (const c of concepts.concepts || []) {
    const introduced = (c.introduced_in || []).some(lid => completedLessons.has(lid));
    if (!introduced) continue;
    const mastery = conceptMastery[c.id] ?? 0;
    if (mastery < 0.6) weakConcepts.push({ ...c, mastery });
  }
  weakConcepts.sort((a, b) => a.mastery - b.mastery);

  // Cards due for review today
  const reviewQueue = (cards || []).filter(c => {
    const sr = progress.cards[c.id] ?? c.sr;
    if (!sr?.next_review) return false;
    return new Date(sr.next_review) <= new Date();
  });

  return { nextLessons, weakConcepts, reviewQueue, blockedByMastery };
}

// ── MASTERY TRACKING ───────────────────────────────────────
function updateConceptMasteryFromQuiz(moduleId) {
  if (!bundle) return;
  const quiz = assessments[moduleId];
  if (!quiz) return;
  if (!progress.conceptMastery) progress.conceptMastery = {};
  for (const q of quiz.questions || []) {
    if (q.type !== 'mcq') continue;
    const chosen = quizState.answers[q.id];
    if (chosen === undefined) continue;
    const correct = chosen === q.correct;
    const weight  = q.weight ?? 0.75;
    for (const cid of q.concepts || []) {
      const current = progress.conceptMastery[cid] ?? 0.5;
      const delta   = correct ? weight * 0.15 : -(weight * 0.10);
      progress.conceptMastery[cid] = Math.max(0, Math.min(1, current + delta));
    }
  }
}

function updateConceptMasteryFromCard(card, quality) {
  if (!bundle) return;
  if (!progress.conceptMastery) progress.conceptMastery = {};
  const weight = card.weight ?? 0.5;
  const delta  = quality >= 4 ? weight * 0.12 : quality >= 3 ? weight * 0.05 : -(weight * 0.08);
  for (const cid of card.concepts || []) {
    const current = progress.conceptMastery[cid] ?? 0.5;
    progress.conceptMastery[cid] = Math.max(0, Math.min(1, current + delta));
  }
}

function updateConceptMasteryFromCodeChallenge(moduleId, challengeId, testsPassed, testsTotal) {
  if (!bundle) return;
  if (!progress.conceptMastery) progress.conceptMastery = {};
  if (!bundle.codeChallenges?.[moduleId]) return;
  const challenge = bundle.codeChallenges[moduleId].challenges?.find(c => c.id === challengeId);
  if (!challenge) return;
  // Code challenges are worth more mastery: +20% for full pass, +5% for partial, -15% for fail
  const weight = challenge.weight ?? 1.0;
  const passRatio = testsTotal > 0 ? testsPassed / testsTotal : 0;
  const isPassed = passRatio >= (challenge.pass_criteria ?? 0.70);
  const isPartial = passRatio > 0.5 && !isPassed;
  const delta = isPassed ? weight * 0.20 : isPartial ? weight * 0.05 : -(weight * 0.15);
  for (const cid of challenge.concepts || []) {
    const current = progress.conceptMastery[cid] ?? 0.5;
    progress.conceptMastery[cid] = Math.max(0, Math.min(1, current + delta));
  }
}

// ── ADAPTIVE VIEWS (Phase C) ─────────────────────────────
function renderProgress() {
  const main = document.getElementById('main');
  if (!bundle) {
    main.innerHTML = '<div class="card"><p>Load a bundle.json to see your progress.</p></div>';
    return;
  }

  const mastery      = progress.conceptMastery || {};
  const allLessons   = course.modules.flatMap(m => m.lessons || []);
  const doneLessons  = Object.keys(progress.lessons || {});
  const completedSet = new Set(doneLessons);

  // Annotate each concept with live mastery + introduced flag
  const conceptList = (concepts.concepts || []).map(c => ({
    ...c,
    mastery:    mastery[c.id] ?? 0,
    introduced: (c.introduced_in || []).some(lid => completedSet.has(lid))
  }));
  const introduced  = conceptList.filter(c => c.introduced);
  const avgMastery  = introduced.length
    ? Math.round(introduced.reduce((s, c) => s + c.mastery, 0) / introduced.length * 100)
    : 0;
  const strongCount = introduced.filter(c => c.mastery >= 0.7).length;
  const weakCount   = introduced.filter(c => c.mastery  <  0.5).length;

  // Build per-module concept sections
  const sections = (course.modules || []).map(mod => {
    const seen = new Set();
    const modConcepts = [];
    for (const l of mod.lessons || []) {
      for (const c of conceptList.filter(c => (c.introduced_in || []).includes(l.id))) {
        if (!seen.has(c.id)) { seen.add(c.id); modConcepts.push(c); }
      }
    }
    if (!modConcepts.length) return '';
    const cards = modConcepts.map(c => {
      const pct   = Math.round(c.mastery * 100);
      const color = c.mastery >= 0.7 ? 'var(--accent)' : c.mastery >= 0.5 ? 'var(--warn)' : 'var(--danger)';
      const badge = !c.introduced
        ? `<span class="badge badge-gray">Locked</span>`
        : c.mastery >= 0.7 ? `<span class="badge badge-green">${pct}%</span>`
        : c.mastery >= 0.5 ? `<span class="badge badge-amber">${pct}%</span>`
        :                    `<span class="badge badge-red">${pct}%</span>`;
      return `
        <div class="mastery-card${c.introduced ? '' : ' locked'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
            <div style="font-size:13px;font-weight:500;line-height:1.3">${c.title}</div>
            ${badge}
          </div>
          <div class="mastery-bar-wrap">
            <div class="mastery-bar-fill" style="width:${c.introduced ? pct : 0}%;background:${color}"></div>
          </div>
        </div>`;
    }).join('');
    return `<div style="margin-bottom:2rem"><h2>${mod.title}</h2><div class="mastery-grid" style="margin-top:0.75rem">${cards}</div></div>`;
  }).join('');

  main.innerHTML = `
    <h1>My progress</h1>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.5rem;margin-top:0.5rem">
      <div class="card card-sm" style="flex:1;min-width:130px;text-align:center">
        <div style="font-size:26px;font-weight:700;color:var(--accent)">${doneLessons.length}/${allLessons.length}</div>
        <div class="text-muted">Lessons done</div>
      </div>
      <div class="card card-sm" style="flex:1;min-width:130px;text-align:center">
        <div style="font-size:26px;font-weight:700;color:var(--accent)">${avgMastery}%</div>
        <div class="text-muted">Avg mastery</div>
      </div>
      <div class="card card-sm" style="flex:1;min-width:130px;text-align:center">
        <div style="font-size:26px;font-weight:700;color:var(--accent)">${strongCount}</div>
        <div class="text-muted">Mastered</div>
      </div>
      <div class="card card-sm" style="flex:1;min-width:130px;text-align:center">
        <div style="font-size:26px;font-weight:700;color:var(--danger)">${weakCount}</div>
        <div class="text-muted">Weak areas</div>
      </div>
    </div>
    ${sections || '<div class="card"><p>Complete some lessons to unlock concept tracking.</p></div>'}
  `;
}

function renderPaths() {
  const main   = document.getElementById('main');
  if (!bundle) {
    main.innerHTML = '<div class="card"><p>Load a bundle.json to see learning paths.</p></div>';
    return;
  }

  const paths    = learningPaths.paths || [];
  const selected = progress.selectedPath || null;

  if (!paths.length) {
    main.innerHTML = '<h1>Learning paths</h1><div class="card"><p>No learning paths defined for this course.</p></div>';
    return;
  }

  const pathCards = paths.map(p => {
    const isActive  = p.id === selected;
    const lessonIds = p.lessons || [];
    const doneCount = lessonIds.filter(lid => progress.lessons[lid]).length;
    const pct       = lessonIds.length ? Math.round(doneCount / lessonIds.length * 100) : 0;
    const focusBadges = (p.focus_areas || []).map(f => `<span class="badge badge-gray">${f}</span>`).join('');
    return `
      <div class="card${isActive ? ' path-active' : ''}" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem">

    <h1>Learning paths</h1>

}

function selectPath(pathId) {
  progress.selectedPath = pathId || null;
  saveProgress();
  renderPaths();
}

// ── SIDEBAR ────────────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('module-nav');
  nav.innerHTML = '';
  (course.modules || []).forEach(m => {
    const done = moduleProgress(m);
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.id = 'nav-m-' + m.id;
    btn.onclick = () => showModule(m.id);
    btn.innerHTML = `<span class="nav-dot ${done === 100 ? 'done' : done > 0 ? 'current' : ''}"></span>${m.title}`;
    nav.appendChild(btn);
  });
}

function moduleProgress(m) {
  const lessons = m.lessons || [];
  if (!lessons.length) return 0;
  const done = lessons.filter(l => progress.lessons[l.id]).length;
  return Math.round((done / lessons.length) * 100);
}

function updateOverallProgress() {
  if (!course) return;
  const all = course.modules.flatMap(m => m.lessons || []);
  const done = all.filter(l => progress.lessons[l.id]).length;
  const pct = all.length ? Math.round((done / all.length) * 100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── VIEWS ──────────────────────────────────────────────────
function showView(view) {
  ['plan','cards','code','progress','paths'].forEach(v => {
    const el = document.getElementById('nav-' + v);
    if (el) el.classList.toggle('active', v === view);
  });
  if (view === 'plan')     renderPlan();
  if (view === 'cards')    renderCards();
  if (view === 'code')     renderCodeView();
  if (view === 'progress') renderProgress();
  if (view === 'paths')    renderPaths();
}

function showModule(moduleId) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-m-' + moduleId);
  if (el) el.classList.add('active');
  renderModule(moduleId);
}

        ${blockedByMastery.map(l => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:var(--radius);margin-bottom:8px">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--warn);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">&#128274;</div>
          <div style="flex:1">

function isLessonLocked(l) {
  if (!bundle) return false;
  const prereqs = l.prerequisites || [];
  if (prereqs.length === 0) return false;
  const completed = new Set(Object.keys(progress.lessons || {}));
  const rule = l.unlock_rule ?? 'all_prerequisites_mastered';
  if (rule === 'any_prerequisite_mastered') return !prereqs.some(pid => completed.has(pid));
  return !prereqs.every(pid => completed.has(pid));
}

function renderModuleCard(m) {
  const pct = moduleProgress(m);
  const lessons = (m.lessons || []).map(l => {
    const locked  = isLessonLocked(l);
    const done    = !!progress.lessons[l.id];
    const handler = locked ? '' : `onclick="showLesson('${l.id}','${m.id}')"`;
    const lockIcon = locked
      ? `<span title="Complete prerequisites first" style="margin-left:auto;font-size:13px;opacity:0.5">🔒</span>`
      : `<span class="text-muted" style="margin-left:auto">${l.estimated_minutes}m</span>`;
    return `
    <li class="lesson-item${locked ? ' locked' : ''}" ${handler} style="${locked ? 'opacity:0.45;cursor:default;' : ''}">
      <div class="lesson-check ${done ? 'done' : ''}">
        ${done ? '✓' : ''}
      </div>
      <span>${l.title}</span>
      ${lockIcon}
    </li>
  `;
  }).join('');
  return `
    <div class="module-card" onclick="toggleModule('${m.id}')">
      <div class="module-header">
        <span class="module-title">${m.id} · ${m.title}</span>
        <span class="badge ${pct===100?'badge-green':pct>0?'badge-amber':'badge-gray'}">${pct}%</span>
      </div>
      <div class="module-meta">${(m.lessons||[]).length} lessons · ${m.description || ''}</div>
      <ul class="lesson-list open" id="ll-${m.id}">${lessons}</ul>
    </div>
  `;
}

  const el = document.getElementById('ll-' + id);

}

// ── LESSON READER ──────────────────────────────────────────
function showLesson(lessonId, moduleId) {
  const m = course.modules.find(x => x.id === moduleId);
  const l = m?.lessons.find(x => x.id === lessonId);
  if (!l) return;
  if (isLessonLocked(l)) {
    const prereqTitles = (l.prerequisites || []).map(pid => {
      for (const mod of course.modules) {
        const found = mod.lessons?.find(x => x.id === pid);
        if (found) return found.title;
      }
      return pid;
    }).join(', ');
    alert(`🔒 This lesson is locked.\n\nComplete first: ${prereqTitles}`);
    return;
  }

  const allLessons = course.modules.flatMap(mod => mod.lessons || []);
  const idx = allLessons.findIndex(x => x.id === lessonId);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="flex items-center gap-8 mb-4" style="flex-wrap:wrap">
      <span class="badge badge-gray">${m.title}</span>
      <span class="badge badge-gray">${l.type}</span>
      <span class="text-muted">${l.estimated_minutes} min</span>
    </div>
    <h1 style="margin-bottom:1rem">${l.title}</h1>

    <div id="lesson-body" class="card lesson-content">
      ${(bundle?.lessons?.[lessonId]) ? simpleMarkdown(bundle.lessons[lessonId]) : `
      <div style="text-align:center;color:var(--muted);padding:2rem">
        <p>Load the lesson file to read it.</p>
        <button class="btn mt-4" onclick="document.getElementById('lesson-file-input').click()">
          Load ${lessonId}.md
        </button>
        <input type="file" id="lesson-file-input" accept=".md" onchange="loadLessonFile(event,'${lessonId}','${moduleId}')" style="display:none">
      </div>`}
    </div>

    <div class="lesson-nav">
      <div>${prev ? `<button class="btn" onclick="showLesson('${prev.id}','${getModuleForLesson(prev.id)}')">← ${prev.title}</button>` : ''}</div>
      <div class="flex gap-8">
        ${!progress.lessons[lessonId] ? `<button class="btn btn-primary" onclick="markDone('${lessonId}','${moduleId}')">Mark complete ✓</button>` : `<span class="badge badge-green">Completed ✓</span>`}
        ${next ? `<button class="btn" onclick="showLesson('${next.id}','${getModuleForLesson(next.id)}')">Next →</button>` : ''}
      </div>
    </div>
  `;
}

function loadLessonFile(event, lessonId, moduleId) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const body = document.getElementById('lesson-body');
    if (body) body.innerHTML = simpleMarkdown(e.target.result);
  };
  reader.readAsText(file);
}

function simpleMarkdown(md) {
  // Normalize Windows line endings so all patterns can use \n
  md = md.replace(/\r\n/g, '\n');

  // Extract fenced code blocks into placeholders so later transforms can't corrupt them
  const blocks = [];
  md = md.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
    const html = '<pre><code>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>';
    blocks.push(html);
    return `\x00BLOCK${blocks.length - 1}\x00`;
  });

  // Parse GFM tables (must run before inline transforms so pipes don't get corrupted)
  md = md.replace(/(\|[^\n]+\|\n\|[ \t|:\-]+\|\n(?:\|[^\n]+\|\n?)+)/g, tableBlock => {
    const lines = tableBlock.trim().split('\n');
    const headers = lines[0].split('|').slice(1, -1).map(h => h.trim());
    const rows = lines.slice(2).map(row => row.split('|').slice(1, -1).map(c => c.trim()));
    const thead = `<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>`;
    const tbody = `<tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>`;
    const html = `<table class="md-table">${thead}${tbody}</table>`;
    blocks.push(html);
    return `\x00BLOCK${blocks.length - 1}\x00`;
  });

  md = md
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
      const external = /^https?:\/\//.test(url);
      return `<a href="${url}"${external ? ' target="_blank" rel="noopener noreferrer"' : ''}>${text}</a>`;
    })
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, s => '<ul>' + s + '</ul>')
    .replace(/^(?!<[hul\x00]|\s*$)(.+)$/gm, '<p>$1</p>')
    .replace(/\n{3,}/g, '\n\n');

  // Restore code blocks
  return md.replace(/\x00BLOCK(\d+)\x00/g, (_, i) => blocks[+i]);
}

function getModuleForLesson(lessonId) {
  const m = course.modules.find(mod => mod.lessons?.some(l => l.id === lessonId));
  return m?.id || '';
}

function markDone(lessonId, moduleId) {

  buildSidebar();

  showLesson(lessonId, moduleId);
}

// ── FLASHCARDS (SM-2) ──────────────────────────────────────
function renderCards() {
  const main = document.getElementById('main');
  if (!cards) {
    main.innerHTML = `
      <h1>Flashcards</h1>
      <div class="drop-zone" onclick="document.getElementById('fc-input').click()">
        <p>Load your cards.json file to start reviewing</p>
        <button class="btn mt-4">Load cards.json</button>
        <input type="file" id="fc-input" accept=".json" onchange="loadCards(this.files[0])" style="display:none">
      </div>
    `;
    return;
  }

  const due = cards.filter(c => {
    if (!c.sr) c.sr = { ease: 2.5, interval: 0, reviews: 0, lapses: 0, next_review: null };
    if (!c.sr.next_review) return true;
    return new Date(c.sr.next_review) <= new Date();
  });

  if (!due.length) {
    const next = cards.reduce((a, b) => new Date(a.sr.next_review) < new Date(b.sr.next_review) ? a : b);
    main.innerHTML = `
      <h1>Flashcards</h1>
      <div class="card" style="text-align:center;padding:2.5rem">
        <h2>All caught up!</h2>
        <p>Next card due: ${new Date(next.sr.next_review).toLocaleDateString()}</p>
        <p>${cards.length} cards total · ${cards.filter(c=>c.sr.reviews>0).length} reviewed</p>
      </div>
    `;
    return;
  }

  cardSession = { queue: [...due].sort(() => Math.random()-0.5), current: 0, flipped: false };
  renderCard();
}

function renderCard() {
  const main = document.getElementById('main');
  const { queue, current } = cardSession;
  if (current >= queue.length) {
    main.innerHTML = `
      <h1>Session complete</h1>
      <div class="card" style="text-align:center;padding:2.5rem">
        <h2>Well done!</h2>
        <p>Reviewed ${queue.length} cards.</p>
        <button class="btn btn-primary mt-4" onclick="renderCards()">Review again</button>
      </div>
    `;
    return;
  }

  const card = queue[current];
  main.innerHTML = `
    <h1>Flashcards</h1>
    <div class="fc-progress">${current + 1} of ${queue.length} due today</div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="fc" onclick="flipCard()">
        <div class="fc-face">
          <div class="fc-label">Question · click to reveal</div>
          <div class="fc-text">${card.front}</div>
          <div class="fc-source">${card.module} · ${card.type}</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">Answer</div>
          <div class="fc-text">${card.back}</div>
          <div class="fc-source">${card.source_ref}</div>
        </div>
      </div>
    </div>
    <div id="rating-row" style="display:none" class="rating-row">
      <button class="rating-btn hard" onclick="rateCard(1)">Hard</button>
      <button class="rating-btn okay" onclick="rateCard(3)">Okay</button>
      <button class="rating-btn easy" onclick="rateCard(5)">Easy</button>
    </div>
  `;
}

function flipCard() {
  const fc = document.getElementById('fc');
  const rr = document.getElementById('rating-row');
  if (fc) fc.classList.toggle('flipped');
  if (rr) rr.style.display = 'flex';
  cardSession.flipped = true;
}

function rateCard(quality) {
  const card = cardSession.queue[cardSession.current];
  const sr = card.sr;

  // SM-2 algorithm
  if (quality >= 3) {
    if (sr.reviews === 0) sr.interval = 1;
    else if (sr.reviews === 1) sr.interval = 6;
    else sr.interval = Math.round(sr.interval * sr.ease);
    sr.ease = Math.max(1.3, sr.ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  } else {
    sr.interval = 1;
    sr.lapses = (sr.lapses || 0) + 1;
  }

  sr.reviews = (sr.reviews || 0) + 1;
  const next = new Date();
  next.setDate(next.getDate() + sr.interval);
  sr.next_review = next.toISOString().split('T')[0];

  updateConceptMasteryFromCard(card, quality);
  progress.cards[card.id] = { ...sr };
  saveProgress();

  cardSession.current++;
  renderCard();
}

async function initCodeEditor(challengeId, language, code) {
  if (window._cmEditors[challengeId]) {
    window._cmEditors[challengeId].toTextArea();
    delete window._cmEditors[challengeId];
  }
  try {
    const CM = await loadCodeMirror();
    const el = document.getElementById(`code-${challengeId}`);
    if (!el) return; // user navigated away while CM was loading
    el.style.display = ''; // briefly show textarea while replacing
    const cm = CM.fromTextArea(el, {
      mode: language === 'python' ? 'python' : 'javascript',
      lineNumbers: true,
      indentUnit: language === 'python' ? 4 : 2,
      tabSize:    language === 'python' ? 4 : 2,
      indentWithTabs: false,
      lineWrapping: false,
      autofocus: true,
      extraKeys: {
        Tab:          cm => cm.execCommand('indentMore'),
        'Shift-Tab':  cm => cm.execCommand('indentLess'),
      }
    });
    cm.setValue(code);
    window._cmEditors[challengeId] = cm;
  } catch (err) {
    console.warn('CodeMirror unavailable, using plain textarea:', err);
    const el = document.getElementById(`code-${challengeId}`);
    if (el) el.style.display = '';
  }
}

function getEditorCode(challengeId) {
  const cm = window._cmEditors?.[challengeId];
  if (cm) return cm.getValue();
  const el = document.getElementById(`code-${challengeId}`);
  return el ? el.value : '';
}

async function runChallengeTests(moduleId, challengeId) {
  const challenge = bundle?.codeChallenges?.[moduleId]?.challenges?.find(c => c.id === challengeId);
  const resultsEl = document.getElementById(`tests-${challengeId}`);
  const btn       = document.querySelector(`button[onclick="runChallengeTests('${moduleId}','${challengeId}')"]`);
  if (!challenge || !resultsEl) return;

  const code = getEditorCode(challengeId).trim();
  if (!code) { alert('Please enter some code first.'); return; }

  const fnName = detectFunctionName(code, challenge.language);
  if (!fnName) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `<div class="test-result failed">✗ Could not detect a function. Define one like: <code>def solution(...):</code></div>`;
    return;
  }

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `<div style="color:var(--muted);font-size:13px">⏳ Running ${challenge.language === 'python' ? 'Python (loading WASM…)' : 'JavaScript'} tests…</div>`;
  if (btn) btn.disabled = true;

  try {
    const visibleTests = challenge.test_cases.filter(t => t.visibility === 'visible');
    const results = challenge.language === 'python'
      ? await evalPython(code, visibleTests, fnName)
      : await evalJavaScript(code, visibleTests, fnName);
    resultsEl.innerHTML = renderTestResults(results, challengeId);
    quizState.answers[challengeId] = { code, language: challenge.language, fnName };
  } catch (err) {
    resultsEl.innerHTML = `<div class="test-result failed">✗ ${err.message}</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function submitChallenge(moduleId, challengeId) {
  const challenge = bundle?.codeChallenges?.[moduleId]?.challenges?.find(c => c.id === challengeId);
  const resultsEl = document.getElementById(`tests-${challengeId}`);
  const btn       = document.querySelector(`button[onclick="submitChallenge('${moduleId}','${challengeId}')"]`);
  if (!challenge) return;

  const code = getEditorCode(challengeId).trim();
  if (!code) { alert('Please enter some code first.'); return; }

  const fnName = detectFunctionName(code, challenge.language);
  if (!fnName) {
    if (resultsEl) { resultsEl.style.display = 'block'; resultsEl.innerHTML = `<div class="test-result failed">✗ Could not detect a function.</div>`; }
    return;
  }

  if (resultsEl) { resultsEl.style.display = 'block'; resultsEl.innerHTML = `<div style="color:var(--muted);font-size:13px">⏳ Running all tests…</div>`; }
  if (btn) btn.disabled = true;

  try {
    const results = challenge.language === 'python'
      ? await evalPython(code, challenge.test_cases, fnName)
      : await evalJavaScript(code, challenge.test_cases, fnName);

    if (resultsEl) resultsEl.innerHTML = renderTestResults(results, challengeId);

    const testsPassed = results.filter(r => r.passed).length;
    const passed = testsPassed >= challenge.test_cases.length * (challenge.pass_criteria ?? 0.70);
    updateConceptMasteryFromCodeChallenge(moduleId, challengeId, testsPassed, challenge.test_cases.length);

    if (!progress.codeChallenges)              progress.codeChallenges = {};
    if (!progress.codeChallenges[moduleId])    progress.codeChallenges[moduleId] = {};
    progress.codeChallenges[moduleId][challengeId] = { passed, testsPassed, testsTotal: challenge.test_cases.length, date: new Date().toISOString() };
    saveProgress();

    // Update dot in sidebar
    const dotCode = document.getElementById('dot-code');
    if (dotCode) {
      const allDone = Object.values(bundle.codeChallenges || {})
        .flatMap(m => m.challenges || [])
        .every(c => progress.codeChallenges?.[moduleId]?.[c.id]?.passed);
      dotCode.className = 'nav-dot' + (allDone ? ' done' : ' current');
    }
  } catch (err) {
    if (resultsEl) resultsEl.innerHTML = `<div class="test-result failed">✗ ${err.message}</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

  main.innerHTML = `
    <h1>${quiz.title}</h1>
    <p class="text-muted">${quiz.questions?.length} questions · Passing: ${quiz.passing_score}%</p>
    ${challengesHint}
    <div style="margin-top:1.5rem">${questions}</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitQuiz('${moduleId}')">Submit</button>
    </div>
    <div id="quiz-result" style="margin-top:1rem;display:none"></div>
  `;
}

function renderQuestion(q, i) {
  if (q.type === 'mcq') {
    const opts = Object.entries(q.options || {}).map(([k,v]) => `
      <div class="option" id="opt-${q.id}-${k}" onclick="selectOption('${q.id}','${k}')">
        <span class="option-key">${k}</span> ${v}
      </div>
    `).join('');
    return `
      <div class="question-card">
        <div class="question-text">${i+1}. ${q.question}</div>
        <div class="option-list">${opts}</div>
        <div class="explanation" id="exp-${q.id}">${q.explanation || ''}</div>
      </div>
    `;
  }
  if (q.type === 'short_answer') {
    return `
      <div class="question-card">
        <div class="question-text">${i+1}. ${q.question}</div>
        <div class="short-answer">
          <textarea id="sa-${q.id}" placeholder="Your answer..."></textarea>
        </div>
        <div class="answer-key" id="ak-${q.id}">
          <strong>Answer key:</strong><br>
          ${(q.answer_key?.required_points || []).map(p => '• ' + p).join('<br>')}
          ${q.answer_key?.full_credit ? '<br><br><strong>Full credit:</strong> ' + q.answer_key.full_credit : ''}
        </div>
      </div>
    `;
  }
  if (q.type === 'essay') {
    return `
      <div class="question-card">
        <div class="question-text">${i+1}. ${q.prompt}</div>
        <div class="short-answer">
          <textarea id="sa-${q.id}" placeholder="Your essay response..." style="min-height:120px"></textarea>
        </div>
        <div class="answer-key" id="ak-${q.id}">
          <strong>Guidance:</strong> ${q.guidance || ''}<br><br>
          <strong>Rubric:</strong><br>
          ${Object.entries(q.rubric || {}).map(([g,d]) => `<strong>${g}:</strong> ${d}`).join('<br>')}
        </div>
      </div>
    `;
  }
  return '';
}

function selectOption(qId, key) {
  quizState.answers[qId] = key;
  document.querySelectorAll(`[id^="opt-${qId}-"]`).forEach(el => el.classList.remove('selected'));
  const sel = document.getElementById(`opt-${qId}-${key}`);
  if (sel) sel.classList.add('selected');
}

// ── CODE EXECUTION ENGINE ──────────────────────────────────
function detectFunctionName(code, language) {
  // Extract the first function name defined in the starter code
  const pattern = language === 'python'
    ? /^def\s+([a-zA-Z_]\w*)\s*\(/m
    : /^(?:function\s+([a-zA-Z_]\w*)|(?:const|let|var)\s+([a-zA-Z_]\w*)\s*=\s*(?:function|\())/m;
  const m = code.match(pattern);
  return m ? (m[1] || m[2]) : null;
}

async function evalJavaScript(code, testCases, fnName) {
  const results = [];
  for (const tc of testCases) {
    try {
      // Build a function that defines the learner's code then calls it
      const runner = new Function(`${code}\nreturn String(${fnName}(${tc.input}));`);
      const actual = runner();
      const passed = actual.trim() === String(tc.expected_output).trim();
      results.push({ name: tc.name, passed, actual, expected: tc.expected_output, visibility: tc.visibility });
    } catch (err) {
      results.push({ name: tc.name, passed: false, actual: `Error: ${err.message}`, expected: tc.expected_output, visibility: tc.visibility });
    }
  }
  return results;
}

async function evalPython(code, testCases, fnName) {
  const results = [];
  let pyodide;
  try {
    pyodide = await loadPyodide();
  } catch (e) {
    return testCases.map(tc => ({ name: tc.name, passed: false, actual: 'Pyodide failed to load (check internet for first-time setup)', expected: tc.expected_output, visibility: tc.visibility }));
  }
  for (const tc of testCases) {
    try {
      const script = `${code}\nstr(${fnName}(${tc.input}))`;
      const actual = pyodide.runPython(script);
      const passed = String(actual).trim() === String(tc.expected_output).trim();
      results.push({ name: tc.name, passed, actual: String(actual), expected: tc.expected_output, visibility: tc.visibility });
    } catch (err) {
      const msg = err.message?.split('\n').pop() || err.message;
      results.push({ name: tc.name, passed: false, actual: `Error: ${msg}`, expected: tc.expected_output, visibility: tc.visibility });
    }
  }
  return results;
}

function renderTestResults(results, challengeId) {
  const passed = results.filter(r => r.passed).length;
  const total  = results.length;
  const allPassed = passed === total;
  const summaryClass = allPassed ? 'all-passed' : 'some-failed';
  const summaryIcon  = allPassed ? '✓' : '✗';

  const rows = results.map(r => {
    const icon = r.passed ? '✓' : '✗';
    const cls  = r.passed ? 'passed' : 'failed';
    const hidden = r.visibility === 'hidden' ? ' <span style="font-size:11px;opacity:0.6">(hidden)</span>' : '';
    const detail = r.passed ? '' : `<div style="font-size:11px;margin-top:2px;color:var(--muted)">Got: <code>${r.actual}</code> · Expected: <code>${r.expected}</code></div>`;
    return `<div class="test-result ${cls}">${icon} ${r.name}${hidden}${detail}</div>`;
  }).join('');

  return `
    <div class="test-result-summary ${summaryClass}">${summaryIcon} ${passed}/${total} tests passed</div>
    ${rows}
  `;
}

async function runCodeTests(challengeId) {
  const resultsEl = document.getElementById(`tests-${challengeId}`);
  const btn       = document.querySelector(`button[onclick="runCodeTests('${challengeId}')"]`);
  if (!resultsEl) return;

  const code = getEditorCode(challengeId).trim();
  if (!code) { alert('Please enter some code before running tests.'); return; }

  // Find this challenge in the bundle
  let challenge = null;
  for (const mod of Object.values(bundle?.codeChallenges || {})) {
    const found = (mod.challenges || []).find(c => c.id === challengeId);
    if (found) { challenge = found; break; }
  }
  if (!challenge) { resultsEl.style.display = 'block'; resultsEl.innerHTML = '<p>Challenge not found.</p>'; return; }

  const fnName = detectFunctionName(code, challenge.language);
  if (!fnName) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `<div class="test-result failed">✗ Could not detect a function name. Define a function like: <code>def solution(...):</code></div>`;
    return;
  }

  // Show loading state
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `<div style="color:var(--muted);font-size:13px">⏳ Running ${challenge.language === 'python' ? 'Python (loading WASM…)' : 'JavaScript'} tests…</div>`;
  if (btn) btn.disabled = true;

  // Only run visible tests on "Run Tests", hidden tests run on Submit
  const visibleTests = challenge.test_cases.filter(t => t.visibility === 'visible');

  try {
    const results = challenge.language === 'python'
      ? await evalPython(code, visibleTests, fnName)
      : await evalJavaScript(code, visibleTests, fnName);

    resultsEl.innerHTML = renderTestResults(results, challengeId);
    const passed = results.filter(r => r.passed).length;
    quizState.answers[challengeId] = { code, language: challenge.language, fnName, visiblePassed: passed, visibleTotal: visibleTests.length };
  } catch (err) {
    resultsEl.innerHTML = `<div class="test-result failed">✗ Execution error: ${err.message}</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

function submitQuiz(moduleId) {
  const quiz = assessments[moduleId];
  const mcqs = (quiz.questions || []).filter(q => q.type === 'mcq');
  let correct = 0;

  mcqs.forEach(q => {
    const chosen = quizState.answers[q.id];
    const optEls = document.querySelectorAll(`[id^="opt-${q.id}-"]`);
    optEls.forEach(el => {
      const key = el.id.split('-').pop();
      el.classList.remove('selected');
      if (key === q.correct) el.classList.add('correct');
      else if (key === chosen && chosen !== q.correct) el.classList.add('wrong');
    });
    const exp = document.getElementById('exp-' + q.id);
    if (exp) exp.classList.add('show');
    if (chosen === q.correct) correct++;
  });

  // Reveal short answer keys
  quiz.questions.filter(q => q.type !== 'mcq').forEach(q => {
    const ak = document.getElementById('ak-' + q.id);
    if (ak) ak.classList.add('show');
  });

  const score = mcqs.length ? Math.round((correct / mcqs.length) * 100) : null;
  const passed = score === null || score >= quiz.passing_score;

  progress.quizzes[moduleId] = { score, date: new Date().toISOString(), passed };
  updateConceptMasteryFromQuiz(moduleId);

  saveProgress();
  const result = document.getElementById('quiz-result');
  if (result) {
    result.style.display = 'block';
    result.innerHTML = `
      <div class="card" style="text-align:center;padding:1.5rem">
        ${score !== null ? `<div class="quiz-score">${score}%</div>
        <div class="quiz-score-label">${correct}/${mcqs.length} correct · ${passed ? 'Passed ✓' : 'Not yet — review and retry'}</div>` : ''}
        <p style="margin-top:0.75rem">Short answer questions revealed above — review and self-assess.</p>
      </div>
    `;
  }
}

// ── STARTUP: auto-load from home page ─────────────────────
(function autoLoad() {
  const params = new URLSearchParams(window.location.search);
  const slug   = params.get('course');
  if (!slug) return;

  // Check for a pending bundle passed from home page
  const pendingKey  = 'grove_pending_bundle_' + slug;
  const pendingJson = sessionStorage.getItem(pendingKey);
  if (pendingJson) {
    sessionStorage.removeItem(pendingKey);
    try {
      initFromBundle(JSON.parse(pendingJson));
    } catch (e) {
      alert('Could not load bundle: ' + e.message);
    }
    return;
  }

  // Otherwise try to fetch bundle.json directly from the server
  fetch('/curriculum/' + slug + '/bundle.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => initFromBundle(data))
    .catch(() => {
      // Bundle not available — silently stay on load screen
      // User can still manually load via the button
    });
})();
</script>
