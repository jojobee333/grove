<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grove</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a18;
    --muted: #6b6b65;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --accent-text: #1a4032;
    --radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --border: rgba(255,255,255,0.1);
      --text: #e8e8e2;
      --muted: #888880;
      --accent: #52b788;
      --accent-light: #1a3028;
      --accent-text: #a7d9bb;
    }
  }

  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .tagline { font-size: 14px; color: var(--muted); }

  .content { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem; }

  h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; font-size: 11px; }

  .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem; }

  .course-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .course-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .course-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-gray  { background: var(--border); color: var(--muted); }

  .course-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .course-meta { display: flex; gap: 1rem; font-size: 12px; color: var(--muted); }

  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 32px; text-align: right; }

  .card-footer { display: flex; gap: 8px; margin-top: 0.25rem; }

  .btn {
    padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: var(--surface); color: var(--text); transition: background 0.1s;
  }
  .btn:hover { background: var(--accent-light); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }

  .no-progress { font-size: 12px; color: var(--muted); font-style: italic; }

  input[type=file] { display: none; }

  #status { margin-top: 2rem; font-size: 13px; color: var(--muted); min-height: 20px; }
</style>
</head>
<body>

<header class="header">
  <span class="brand">Grove</span>
  <span class="tagline">Structured learning from research</span>
  <div style="margin-left:auto">
    <button class="btn" onclick="document.getElementById('global-bundle-input').click()">Load bundle</button>
    <input type="file" id="global-bundle-input" accept=".json" onchange="loadBundle(event)">
  </div>
</header>

<div class="content">
  <h2>Your courses</h2>
  <div class="course-grid" id="course-grid">
    <p style="color:var(--muted);font-size:14px">Loading coursesâ€¦</p>
  </div>
  <div id="status"></div>
</div>

<script>
async function init() {
  let index;
  try {
    const res = await fetch('/curriculum/index.json');
    index = await res.json();
  } catch (e) {
    document.getElementById('course-grid').innerHTML =
      '<p style="color:var(--muted)">Could not load curriculum/index.json. Is the server running from the grove/ folder?</p>';
    return;
  }

  const grid = document.getElementById('course-grid');
  grid.innerHTML = '';

  for (const c of index.courses) {
    const saved = localStorage.getItem('grove_progress_' + c.slug);
    const prog  = saved ? JSON.parse(saved) : null;

    const completedLessons = prog ? Object.keys(prog.lessons || {}).length : 0;
    const pct = c.total_lessons ? Math.round((completedLessons / c.total_lessons) * 100) : 0;
    const completedCards = prog ? Object.keys(prog.cards || {}).length : 0;
    const hasProgress = completedLessons > 0 || completedCards > 0;

    const progressHtml = hasProgress ? `
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="progress-label">${pct}%</span>
      </div>
      <div class="course-meta">
        <span>${completedLessons} / ${c.total_lessons} lessons</span>
        <span>${completedCards} / ${c.total_cards} cards reviewed</span>
        ${prog?.quizzes ? `<span>${Object.keys(prog.quizzes).length} quiz${Object.keys(prog.quizzes).length !== 1 ? 'zes' : ''} taken</span>` : ''}
      </div>` : `<div class="course-meta"><span class="no-progress">No progress yet</span></div>`;

    const card = document.createElement('div');
    card.className = 'course-card';
    card.innerHTML = `
      <div class="course-header">
        <span class="course-title">${c.title}</span>
        ${c.adaptive ? '<span class="badge badge-green">v3 adaptive</span>' : '<span class="badge badge-gray">basic</span>'}
      </div>
      <div class="course-desc">${c.description}</div>
      <div class="course-meta">
        <span>${c.total_modules} modules</span>
        <span>${c.total_lessons} lessons</span>
        <span>${c.total_cards} cards</span>
      </div>
      ${progressHtml}
      <div class="card-footer">
        <button class="btn btn-primary" onclick="openCourse('${c.slug}')">
          ${hasProgress ? 'Continue' : 'Start'}
        </button>
        ${hasProgress ? `<button class="btn" style="margin-left:auto;color:var(--muted)" onclick="resetProgress('${c.slug}', this)">Reset</button>` : ''}
      </div>
    `;
    grid.appendChild(card);
  }
}

function openCourse(slug) {
  window.location.href = `/app?course=${slug}`;
}

function loadBundle(event) {
  const file = event.target.files[0];
  if (!file) return;
  // Reset so the same file can be loaded again if needed
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || !data.course || !data.slug) {
        alert('⚠️ This does not look like a valid bundle.json.\n\nBuild one with: node build-bundle.mjs <slug>');
        return;
      }
      const slug = data.slug;
      sessionStorage.setItem('grove_pending_bundle_' + slug, e.target.result);
      window.location.href = `/app?course=${slug}&from=home`;
    } catch(err) {
      alert('Could not parse file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function resetProgress(slug, btn) {
  if (!confirm(`Reset all progress for this course? This cannot be undone.`)) return;
  localStorage.removeItem('grove_progress_' + slug);
  btn.closest('.course-card').querySelector('.progress-row')?.remove();
  init();
}

init();
</script>
</body>
</html>
